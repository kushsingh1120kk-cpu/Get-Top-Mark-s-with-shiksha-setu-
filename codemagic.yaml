
workflows:
  android-workflow:
    name: Android AAB Build
    environment:
      flutter: 3.27.0
      android_signing:
        - shiksha _ setu 
    scripts:
      - name: Extract ZIP
        script: |
          unzip -o qZoAvuQWxaMCoksb.zip -d project
          cd project/shiksha_setu
          python3 -c "
          f = open('android/app/build.gradle', 'r')
          content = f.read()
          f.close()
          content = content.replace('compileSdk = flutter.compileSdkVersion.toInteger()', 'compileSdk = 35')
          content = content.replace('targetSdk = flutter.targetSdkVersion.toInteger()', 'targetSdk = 35')
          f = open('android/app/build.gradle', 'w')
          f.write(content)
          f.close()
          "
          python3 -c "
          import re
          f = open('android/gradle/wrapper/gradle-wrapper.properties', 'r')
          content = f.read()
          f.close()
          content = re.sub(r'gradle-[0-9.]+-all.zip', 'gradle-8.7-all.zip', content)
          f = open('android/gradle/wrapper/gradle-wrapper.properties', 'w')
          f.write(content)
          f.close()
          "
      - name: Get packages
        script: cd project/shiksha_setu && flutter pub get
      - name: Build AAB
        script: cd project/shiksha_setu && flutter build appbundle --release
    artifacts:
      - project/shiksha_setu/build/**/outputs/**/*.aab
